html, body, #canvas {
	margin: 0;
	padding: 0;

body {

	touch-action: none;

#canvas {

}

#canvas:focus {
	outline: none;

#status {
	position: absolute;
	left: 0;
	right: 0;
	top: 0;
	bottom: 0;
	background-color: #07101b;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-player-icon, #status-notice {
	display: none;
}

#status-player-icon {
	position: relative;
	width: 74px;
	height: 74px;
}

#status-player-icon::before {
	content: '';
	position: absolute;
	left: 13px;
	top: 13px;
	width: 48px;
	height: 48px;
	border-radius: 50%;
	background: rgba(46, 191, 242, 0.08);
	animation: player-pulse 2.24s ease-in-out infinite;
}

#status-player-core {
	position: absolute;
	left: 24px;
	top: 24px;
	width: 26px;
	height: 26px;
	border-radius: 50%;
	background: #83e8ff;
	animation: player-pulse 2.24s ease-in-out infinite;
}

#status-player-ring {
	box-sizing: border-box;
	position: absolute;
	left: 3px;
	top: 3px;
	width: 68px;
	height: 68px;
	border: 3px solid #3f6f91;
	border-left-color: transparent;
	border-radius: 50%;
	animation: player-spin 6.28s linear infinite;
}

@keyframes player-pulse {
	0%, 100% { transform: scale(1); }
	50% { transform: scale(1.09); }
}

@keyframes player-spin {
	to { transform: rotate(360deg); }
}

@media (prefers-reduced-motion: reduce) {
	#status-player-icon::before,
	#status-player-core {
		animation: none;
	}

	#status-player-ring {
		animation-duration: 12s;
	}
}

.analytics-button.primary {

.analytics-button.secondary {
	color: #d6e2f0;

}

@media (max-width: 720px) {
	#analytics-banner {
		flex-direction: column;
		align-items: stretch;

		<script type="module">
const DISCORD_ACTIVITY_SESSION_KEY = 'maze-discord-activity-session';

const mazeDiscordState = {
	enabled: false,
	clientId: '',
	isActivity: false,
	initComplete: false,
	sdkReady: false,
	loginInFlight: false,
	authenticated: false,
	activityScopeReady: false,
	activityUpdateInFlight: false,
	lastActivitySignature: '',
	apiBasePath: '',
	sessionToken: '',
	user: null,
	participants: [],
	error: '',
};

let mazeDiscordSdk = null;
let mazeDiscordInitPromise = null;

function isDiscordActivityHost() {
	return window.location.hostname.endsWith('.discordsays.com');
}

function hasDiscordActivityLaunchParams() {
	const params = new URLSearchParams(window.location.search);
	return params.has('instance_id')
		|| params.has('launch_id')
		|| params.has('frame_id')
		|| params.has('guild_id')
		|| params.has('channel_id');
}

function shouldUseDiscordActivityFlow() {
	return isDiscordActivityHost() || hasDiscordActivityLaunchParams();
}

function mazeDiscordClientIdFromHost() {
	const match = window.location.hostname.match(/^(\d+)\.discordsays\.com$/);
	return match ? match[1] : '';
}

function getMazeServerBaseUrl() {
	return `${window.location.origin}${mazeDiscordState.apiBasePath}`;
}

function mazeApiUrl(path, basePath = mazeDiscordState.apiBasePath) {
	return `${window.location.origin}${basePath}${path}`;
}

function getMazeWebSocketUrl() {
	const url = new URL(getMazeServerBaseUrl());
	url.protocol = url.protocol === 'https:' ? 'wss:' : 'ws:';
	url.pathname = `${mazeDiscordState.apiBasePath}/ws`.replace(/\/+/g, '/');
	url.search = '';
	url.hash = '';
	return url.toString();
}

function mazeApiBasePathFromUrl(url, path) {
	const pathname = new URL(url, window.location.origin).pathname;
	if (!pathname.endsWith(path)) {
		return '';
	}
	return pathname.slice(0, -path.length);
}

function mazeApiCandidates(path) {
	const candidates = [
		mazeDiscordState.apiBasePath,
		'',
		'/.proxy',
	].filter((value, index, values) => values.indexOf(value) === index);
	return candidates.map((basePath) => ({
		basePath,
		url: mazeApiUrl(path, basePath),
	}));
}

async function fetchMazeDiscordJson(path, init = {}) {
	let lastError = null;
	for (const candidate of mazeApiCandidates(path)) {
		try {
			const response = await fetch(candidate.url, init);
			const text = await response.text();
			let payload = null;
			try {
				payload = text ? JSON.parse(text) : {};
			} catch {
				lastError = new Error(`Réponse non JSON depuis ${candidate.url}`);
				continue;
			}
			if (!response.ok) {
				lastError = new Error(payload?.error || `Erreur HTTP ${response.status}`);
				continue;
			}
			mazeDiscordState.apiBasePath = mazeApiBasePathFromUrl(candidate.url, path);
			return { response, payload };
		} catch (error) {
			lastError = error;
		}
	}
	throw lastError || new Error('API Discord Activity indisponible.');
}

function mazePresenceText(value, fallback, maxLength = 128) {
	const text = typeof value === 'string' && value.trim() ? value.trim() : fallback;
	return text.slice(0, maxLength);
}

function mazePresenceIconUrl() {
	return new URL('/index.icon.png', getMazeServerBaseUrl()).toString();
}

function mazeDiscordDisplayName(user) {
	return mazePresenceText(user?.global_name || user?.displayName || user?.username, 'Joueur Discord', 32);
}

function sanitizeMazeDiscordUser(user) {
	if (user == null || typeof user !== 'object') {
		return null;
	}
	const id = typeof user.id === 'string' && /^\d+$/.test(user.id) ? user.id : '';
	if (!id) {
		return null;
	}
	const avatar = typeof user.avatar === 'string' && /^[a-zA-Z0-9_]+$/.test(user.avatar)
		? user.avatar
		: '';
	const discriminator = typeof user.discriminator === 'string' ? user.discriminator : '';
	const defaultAvatar = /^[0-5]$/.test(String(user.defaultAvatar ?? user.default_avatar ?? ''))
		? String(user.defaultAvatar ?? user.default_avatar)
		: (discriminator && discriminator !== '0' ? String(Number(discriminator) % 5) : '0');
	return {
		id,
		username: mazePresenceText(user.username, 'Joueur Discord', 32),
		displayName: mazeDiscordDisplayName(user),
		global_name: typeof user.global_name === 'string' ? user.global_name.slice(0, 32) : null,
		discriminator,
		avatar,
		defaultAvatar,
	};
}

function setMazeDiscordActivityUser(user) {
	const nextUser = sanitizeMazeDiscordUser(user);
	if (nextUser == null) {
		return false;
	}
	mazeDiscordState.user = nextUser;
	return true;
}

function updateMazeDiscordParticipants(participants) {
	mazeDiscordState.participants = Array.isArray(participants)
		? participants.map(sanitizeMazeDiscordUser).filter(Boolean)
		: [];
	if (mazeDiscordState.user != null) {
		const refreshed = mazeDiscordState.participants.find((user) => user.id === mazeDiscordState.user.id);
		if (refreshed != null) {
			mazeDiscordState.user = refreshed;
			return;
		}
	}
	if (mazeDiscordState.participants.length === 1) {
		mazeDiscordState.user = mazeDiscordState.participants[0];
	}
}

async function refreshMazeDiscordParticipants() {
	if (!mazeDiscordState.sdkReady || mazeDiscordSdk == null) {
		return;
	}
	try {
		const response = await mazeDiscordSdk.commands.getInstanceConnectedParticipants();
		updateMazeDiscordParticipants(response?.participants);
	} catch (error) {
		console.debug('Participants Discord Activity indisponibles', error);
	}
}

function buildMazeDiscordActivity(payload = {}) {
	const activity = {
		type: 0,
		details: mazePresenceText(payload.details, 'Dans le lobby'),
		state: mazePresenceText(payload.state, 'Prêt pour une nouvelle course'),
		assets: {
			large_image: mazePresenceText(payload.large_image, mazePresenceIconUrl(), 512),
			large_text: mazePresenceText(payload.large_text, 'A Maze Inc.'),
		},
	};
	const smallImage = typeof payload.small_image === 'string' ? payload.small_image.trim() : '';
	const smallText = typeof payload.small_text === 'string' ? payload.small_text.trim() : '';
	if (smallImage) {
		activity.assets.small_image = smallImage.slice(0, 512);
	}
	if (smallText) {
		activity.assets.small_text = smallText.slice(0, 128);
	}
	const startedAt = Number(payload.started_at);
	if (Number.isFinite(startedAt) && startedAt > 0) {
		activity.timestamps = { start: Math.floor(startedAt) };
	}
	const partySize = Math.max(0, Math.floor(Number(payload.party_size) || 0));
	const partyMax = Math.max(0, Math.floor(Number(payload.party_max) || 0));
	if (partySize > 0 && partyMax > 0) {
		activity.party = { size: [Math.min(partySize, partyMax), partyMax] };
	}
	return activity;
}

function mazeDiscordSnapshot() {
	return {
		enabled: mazeDiscordState.enabled,
		clientId: mazeDiscordState.clientId,
		isActivity: mazeDiscordState.isActivity,
		initComplete: mazeDiscordState.initComplete,
		sdkReady: mazeDiscordState.sdkReady,
		loginInFlight: mazeDiscordState.loginInFlight,
		authenticated: mazeDiscordState.authenticated,
		activityScopeReady: mazeDiscordState.activityScopeReady,
		activityUpdateInFlight: mazeDiscordState.activityUpdateInFlight,
		apiBasePath: mazeDiscordState.apiBasePath,
		sessionToken: mazeDiscordState.sessionToken,
		user: mazeDiscordState.user,
		participants: mazeDiscordState.participants,
		error: mazeDiscordState.error,
	};
}

function setMazeDiscordSessionToken(token) {
	mazeDiscordState.sessionToken = token || '';
	if (mazeDiscordState.sessionToken) {
		window.sessionStorage.setItem(DISCORD_ACTIVITY_SESSION_KEY, mazeDiscordState.sessionToken);
	} else {
		window.sessionStorage.removeItem(DISCORD_ACTIVITY_SESSION_KEY);
	}
}

async function fetchMazeDiscordConfig() {
	const { payload } = await fetchMazeDiscordJson('/api/auth/discord/config', { cache: 'no-store' });
	return payload;
}

async function refreshMazeDiscordSession() {
	if (!mazeDiscordState.sessionToken) {
		mazeDiscordState.authenticated = false;
		mazeDiscordState.user = null;
		return;
	}
	try {
		const { payload } = await fetchMazeDiscordJson('/api/auth/me', {
			cache: 'no-store',
			headers: {
				Authorization: `Bearer ${mazeDiscordState.sessionToken}`,
			},
		});
		if (!payload.authenticated) {
			setMazeDiscordSessionToken('');
			mazeDiscordState.authenticated = false;
			mazeDiscordState.user = null;
			return;
		}
		mazeDiscordState.authenticated = true;
		mazeDiscordState.user = payload.user ?? null;
		mazeDiscordState.error = '';
	} catch (error) {
		console.debug('Session Discord Activity indisponible', error);
	}
}

async function initMazeDiscord() {
	if (mazeDiscordInitPromise) {
		return mazeDiscordInitPromise;
	}
	mazeDiscordInitPromise = (async () => {
		try {
			const hostClientId = mazeDiscordClientIdFromHost();
			let config = {};
			try {
				config = await fetchMazeDiscordConfig();
			} catch (error) {
				if (!hostClientId) {
					throw error;
				}
				console.debug('Configuration serveur Discord indisponible, utilisation du client id Activity', error);
			}
			mazeDiscordState.clientId = typeof config.clientId === 'string' && config.clientId
				? config.clientId
				: hostClientId;
			mazeDiscordState.enabled = Boolean(config.enabled || mazeDiscordState.clientId);
			setMazeDiscordSessionToken(window.sessionStorage.getItem(DISCORD_ACTIVITY_SESSION_KEY) || '');
			await refreshMazeDiscordSession();
			mazeDiscordState.isActivity = shouldUseDiscordActivityFlow()
				&& mazeDiscordState.enabled
				&& !!mazeDiscordState.clientId;
			if (!mazeDiscordState.isActivity) {
				return;
			}
			const { DiscordSDK } = await import('/vendor/discord-embedded-app-sdk.mjs');
			mazeDiscordSdk = new DiscordSDK(mazeDiscordState.clientId);
			void mazeDiscordSdk.subscribe('READY', (payload) => {
				setMazeDiscordActivityUser(payload?.user);
			});
			await mazeDiscordSdk.ready();
			mazeDiscordState.sdkReady = true;
			await refreshMazeDiscordParticipants();
			void mazeDiscordSdk.subscribe('ACTIVITY_INSTANCE_PARTICIPANTS_UPDATE', (payload) => {
				updateMazeDiscordParticipants(payload?.participants);
			}).catch((error) => {
				console.debug('Abonnement participants Discord Activity impossible', error);
			});
			mazeDiscordState.error = '';
		} catch (error) {
			mazeDiscordState.error = error instanceof Error ? error.message : 'Discord Activity indisponible.';
			mazeDiscordState.sdkReady = false;
		} finally {
			mazeDiscordState.initComplete = true;
			if (!mazeDiscordState.sdkReady && shouldUseDiscordActivityFlow()) {
				mazeDiscordInitPromise = null;
			}
		}
	})();
	return mazeDiscordInitPromise;
}

async function authenticateMazeDiscord(scopes = ['identify'], state = 'maze-activity') {
	await initMazeDiscord();
	if (!mazeDiscordState.sdkReady || mazeDiscordSdk == null) {
		throw new Error('Discord Activity non initialise.');
	}
	if (mazeDiscordState.loginInFlight) {
		throw new Error('Connexion Discord deja en cours.');
	}
	mazeDiscordState.loginInFlight = true;
	mazeDiscordState.error = '';
	try {
		const { code } = await mazeDiscordSdk.commands.authorize({
			client_id: mazeDiscordState.clientId,
			response_type: 'code',
			state,
			prompt: 'none',
			scope: scopes,
		});
		const { payload } = await fetchMazeDiscordJson('/api/auth/discord/activity', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ code }),
		});
		const auth = await mazeDiscordSdk.commands.authenticate({
			access_token: payload.access_token,
		});
		if (auth == null) {
			throw new Error('Authentification Activity refusee.');
		}
		setMazeDiscordSessionToken(typeof payload.session === 'string' ? payload.session : '');
		mazeDiscordState.authenticated = true;
		setMazeDiscordActivityUser(payload.user);
		mazeDiscordState.activityScopeReady = Array.isArray(auth.scopes)
			&& auth.scopes.includes('rpc.activities.write');
		mazeDiscordState.error = '';
		return auth;
	} finally {
		mazeDiscordState.loginInFlight = false;
	}
}

async function loginMazeDiscord() {
	try {
		await authenticateMazeDiscord(['identify', 'rpc.activities.write']);
	} catch (error) {
		mazeDiscordState.authenticated = false;
		mazeDiscordState.user = null;
		mazeDiscordState.activityScopeReady = false;
		mazeDiscordState.error = error instanceof Error ? error.message : 'Connexion Discord impossible.';
		console.error(error);
	}
}

async function setMazeDiscordActivity(payload) {
	if (!shouldUseDiscordActivityFlow()) {
		return;
	}
	try {
		await initMazeDiscord();
		if (!mazeDiscordState.sdkReady || mazeDiscordSdk == null) {
			return;
		}
		if (mazeDiscordState.activityUpdateInFlight) {
			return;
		}
		const activity = buildMazeDiscordActivity(payload);
		const signature = JSON.stringify(activity);
		if (signature === mazeDiscordState.lastActivitySignature) {
			return;
		}
		if (!mazeDiscordState.activityScopeReady) {
			return;
		}
		mazeDiscordState.activityUpdateInFlight = true;
		await mazeDiscordSdk.commands.setActivity({ activity });
		mazeDiscordState.lastActivitySignature = signature;
		mazeDiscordState.error = '';
	} catch (error) {
		mazeDiscordState.error = error instanceof Error ? error.message : 'Rich Presence Discord indisponible.';
		console.debug('Mise a jour de la Rich Presence Discord impossible', error);
	} finally {
		mazeDiscordState.activityUpdateInFlight = false;
	}
}

function logoutMazeDiscord() {
	setMazeDiscordSessionToken('');
	mazeDiscordState.authenticated = false;
	mazeDiscordState.user = null;
	mazeDiscordState.activityScopeReady = false;
	mazeDiscordState.lastActivitySignature = '';
	mazeDiscordState.error = '';
	void fetchMazeDiscordJson('/api/auth/logout', {
		method: 'POST',
		cache: 'no-store',
	}).catch((error) => {
		console.debug('Suppression de session Discord impossible', error);
	});
}

window.mazeDiscord = {
	init() {
		void initMazeDiscord();
	},
	beginLogin() {
		void loginMazeDiscord();
	},
	logout() {
		logoutMazeDiscord();
	},
	shouldUseActivityFlow() {
		return shouldUseDiscordActivityFlow();
	},
	getServerBaseUrl() {
		return getMazeServerBaseUrl();
	},
	getWebSocketUrl() {
		return getMazeWebSocketUrl();
	},
	getStateJson() {
		return JSON.stringify(mazeDiscordSnapshot());
	},
	setActivityFromGodot(payload) {
		void setMazeDiscordActivity(payload);
	},
};

void initMazeDiscord();

	try {
		await fetch(mazeApiUrl('/api/analytics/event'), {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ type, path: window.location.pathname }),

(async function () {
	const banner = document.getElementById('analytics-banner');
	const acceptButton = document.getElementById('analytics-accept');
	const declineButton = document.getElementById('analytics-decline');
	let consentState = { enabled: false, consent: 'unknown', doNotTrack: false };

	try {
		const response = await fetch(mazeApiUrl('/api/analytics/consent'), { cache: 'no-store' });
		if (response.ok) {
			consentState = await response.json();
		}
	} catch (error) {
		console.debug('Consentement analytics indisponible', error);
	}

	if (consentState.doNotTrack || !consentState.enabled) {
		return;
	}

	async function saveConsent(consent) {
		try {
			const response = await fetch(mazeApiUrl('/api/analytics/consent'), {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ consent }),
			});
			if (!response.ok) return;
			banner.style.display = 'none';
			if (consent === 'granted') {
				if (!window.sessionStorage.getItem('maze-analytics-session')) {
					window.sessionStorage.setItem('maze-analytics-session', '1');
					await postAnalytics('web_session_started');
				}
				await postAnalytics('web_page_view');
			}
		} catch (error) {
			console.debug('Sauvegarde du consentement impossible', error);
		}
	}

	acceptButton.addEventListener('click', () => { void saveConsent('granted'); });
	declineButton.addEventListener('click', () => { void saveConsent('denied'); });

	if (consentState.consent === 'granted') {
		if (!window.sessionStorage.getItem('maze-analytics-session')) {
			window.sessionStorage.setItem('maze-analytics-session', '1');
			await postAnalytics('web_session_started');
		}
		await postAnalytics('web_page_view');
		return;
	}

	if (consentState.consent === 'unknown') {
		banner.style.display = 'flex';
	}
}());

(function () {
	const statusOverlay = document.getElementById('status');
	const statusPlayerIcon = document.getElementById('status-player-icon');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusPlayerIcon.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('Une erreur inconnue est survenue.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			const missingMsg = 'Erreur\nCertaines fonctionnalités nécessaires au jeu sont indisponibles :\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusPlayerIcon.setAttribute('aria-valuenow', current);
					statusPlayerIcon.setAttribute('aria-valuemax', total);
				} else {
					statusPlayerIcon.removeAttribute('aria-valuenow');
					statusPlayerIcon.removeAttribute('aria-valuemax');
				}
			},
		}).then(() => {
			// Keep the loader above the canvas until Godot has painted the first scene.
			setTimeout(() => {
				requestAnimationFrame(() => setStatusMode('hidden'));
			}, 250);
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
